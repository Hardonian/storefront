name: storefront-ci
on:
  push:
    paths:
      - 'ai-workspace/repos/storefront/**'
  pull_request:
    paths:
      - 'ai-workspace/repos/storefront/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install fastapi uvicorn httpx pytest python-multipart pydantic pydantic-settings jinja2 prometheus-client email-validator
      - name: Test storefront
        env:
          STOREFRONT_DOWNLOAD_SECRET: ci-placeholder-secret-not-real
        working-directory: ai-workspace/repos/storefront
        run: python -m pytest tests/ -q -p no:cacheprovider
