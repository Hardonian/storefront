<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --card: #1a1a1e;
      --text: #e4e4e7;
      --text-muted: #a1a1aa;
      --border: #27272a;
      --accent: #6366f1;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text); line-height: 1.7;
      min-height: 100vh;
    }
    .container { max-width: 760px; margin: 0 auto; padding: 2.5rem 1.5rem; }
    .back-link {
      display: inline-block; margin-bottom: 1.5rem; color: var(--accent);
      text-decoration: none; font-size: 0.9rem;
    }
    .back-link:hover { text-decoration: underline; }
    .doc { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 2.5rem; }
    .doc h1 { font-size: 1.8rem; margin-bottom: 1rem; letter-spacing: -0.02em; }
    .doc h2 { font-size: 1.3rem; margin-top: 2rem; margin-bottom: 0.75rem; }
    .doc h3 { font-size: 1.1rem; margin-top: 1.5rem; margin-bottom: 0.5rem; }
    .doc p { margin-bottom: 1rem; color: #d4d4d8; }
    .doc ul { margin-left: 1.5rem; margin-bottom: 1rem; }
    .doc li { margin-bottom: 0.3rem; color: #d4d4d8; }
    .doc hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
    .doc strong { color: #fff; }
    footer { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.85rem; }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">&larr; Back to Store</a>
    <div class="doc">
      {{ content|safe }}
    </div>
    <footer>
      <p>AI Automated Systems &middot; <a href="/legal/terms-of-service">Terms</a> &middot; <a href="/legal/privacy-policy">Privacy</a> &middot; <a href="/legal/refund-policy">Refunds</a></p>
    </footer>
  </div>
</body>
</html>
